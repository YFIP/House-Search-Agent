name: Scrape and Deploy Listings

on:
  schedule:
    # Two triggers covering both possible UTC times for 8 AM Paris time,
    # since France alternates between CET (UTC+1, winter) and CEST
    # (UTC+2, summer) — GitHub Actions cron only runs in UTC, so a single
    # fixed time would be off by an hour for half the year. The
    # check-schedule job below verifies which one is ACTUALLY correct
    # right now (via the OS's own Europe/Paris timezone database, which
    # handles the exact DST transition dates automatically) and skips
    # the other.
    - cron: '0 6 * * *'   # 8:00 AM CEST (summer/daylight time)
    - cron: '0 7 * * *'   # 8:00 AM CET (winter/standard time)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # Verifies it's genuinely 8 AM in Paris right now before anything else
  # runs — necessary because both cron triggers above fire daily, but
  # only one of them is actually correct for the current season. Always
  # proceeds for manual (workflow_dispatch) runs regardless of time.
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if it's actually 8 AM Paris time right now
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manually triggered — proceeding regardless of time."
            exit 0
          fi
          CURRENT_PARIS_HOUR=$(TZ=Europe/Paris date +%H)
          echo "Current Paris local hour: $CURRENT_PARIS_HOUR"
          if [ "$CURRENT_PARIS_HOUR" = "08" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not actually 8 AM in Paris right now — skipping (the other seasonal trigger will run instead)."
          fi

  # Runs Barnes, Barnes-Suburbs, Junot, Book-a-Flat, and Perenium in one
  # job. SeLoger (Paris-wide) is deliberately NOT run here or anywhere in
  # this pipeline: its own page/result cap was removed (uncapped by
  # design), which made a full run both too slow for any single job
  # budget AND almost entirely redundant — the 20-way per-arrondissement
  # matrix below (scrape-seloger-arrondissement) already covers all of
  # Paris with its own enrichment, in properly parallelized isolated jobs,
  # without this bottleneck. Confirmed live: a Paris-wide run found 5037
  # valid rent listings but needed ~3.8 hours just for detail enrichment
  # at a safe anti-bot concurrency, blowing well past any reasonable job
  # timeout for what the arrondissement matrix already provides.
  scrape-main:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth exceljs
      - name: Scrape main sources (excludes SeLoger, SeLoger-Suburbs)
        run: node scrape-main-sources.js rent details
      - name: Upload main sources output
        uses: actions/upload-artifact@v4
        with:
          name: output-main
          path: output-main.json
          retention-days: 1

  # Sale-listing counterpart to scrape-main above. All 10 sources were
  # individually verified live to support sale/buy listings this session
  # — Barnes (938 real), Junot (849 real), SeLoger (~426/arrondissement),
  # DanielFeau (high volume, up to 18+ pages/arrondissement), and smaller
  # confirmed volumes for the rest.
  scrape-main-sale:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth exceljs
      - name: Scrape main sources - sale (excludes SeLoger, SeLoger-Suburbs)
        run: node scrape-main-sources.js sale details
      - name: Upload main sources sale output
        uses: actions/upload-artifact@v4
        with:
          name: output-main-sale
          path: output-main-sale.json
          retention-days: 1

  # Each SeLoger suburb town gets its OWN isolated job (own runner, own
  # session) — testing whether SeLoger's anti-bot system is flagging the
  # PATTERN of many distinct location searches within one session, not
  # just request volume. Evidence from single-process testing: search #1-2
  # in a session always succeed, #3+ never do, regardless of concurrency,
  # delay, or browser freshness tried within one process.
  #
  # Sharded per town (shard/shardCount in the matrix): real evidence found
  # live (2026-07-21) that removing the page/result cap wasn't enough on
  # its own — the busiest towns (Boulogne-Billancourt: 1522 sale listings)
  # need up to ~70 minutes just for detail-page enrichment, blowing past
  # even a generously bumped timeout. Each shard does its own full
  # pagination pass but only enriches its slice of the listings (see
  # scrapeTown's shardIndex/shardCount in seloger-suburbs-scraper.js) —
  # splitting the expensive part across parallel isolated jobs instead of
  # one job racing an ever-bigger clock. Shard counts below are sized so
  # each shard's enrichment stays around ~20-25 min, computed from real
  # listing counts measured live this session (target ~450 listings/shard).
  scrape-seloger-suburb:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false # one shard failing shouldn't cancel the others
      matrix:
        include:
          - { town: neuilly-sur-seine, shard: 0, shardCount: 1 }
          - { town: boulogne-billancourt, shard: 0, shardCount: 2 }
          - { town: boulogne-billancourt, shard: 1, shardCount: 2 }
          - { town: suresnes, shard: 0, shardCount: 1 }
          - { town: levallois-perret, shard: 0, shardCount: 1 }
          - { town: rueil-malmaison, shard: 0, shardCount: 1 }
          - { town: puteaux, shard: 0, shardCount: 1 }
          - { town: saint-cloud, shard: 0, shardCount: 1 }
          - { town: saint-germain-en-laye, shard: 0, shardCount: 1 }
          - { town: le-vesinet, shard: 0, shardCount: 1 }
          - { town: vaucresson, shard: 0, shardCount: 1 }
          - { town: garches, shard: 0, shardCount: 1 }
          - { town: marnes-la-coquette, shard: 0, shardCount: 1 }
          - { town: ville-d-avray, shard: 0, shardCount: 1 }
          - { town: courbevoie, shard: 0, shardCount: 1 }
          - { town: versailles, shard: 0, shardCount: 1 }
          - { town: issy-les-moulineaux, shard: 0, shardCount: 1 }
          - { town: colombes, shard: 0, shardCount: 1 }
          - { town: nanterre, shard: 0, shardCount: 1 }
          - { town: chatou, shard: 0, shardCount: 1 }
          - { town: croissy-sur-seine, shard: 0, shardCount: 1 }
          - { town: la-celle-saint-cloud, shard: 0, shardCount: 1 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
      - name: Scrape ${{ matrix.town }} shard ${{ matrix.shard }}/${{ matrix.shardCount }} in isolation
        run: node scrape-single-seloger-suburb.js ${{ matrix.town }} rent ${{ matrix.shard }} ${{ matrix.shardCount }}
      - name: Upload ${{ matrix.town }} shard ${{ matrix.shard }} result
        uses: actions/upload-artifact@v4
        with:
          name: output-seloger-${{ matrix.town }}-shard-${{ matrix.shard }}
          path: output-seloger-${{ matrix.town }}-shard-${{ matrix.shard }}.json
          retention-days: 1

  # Sale-listing counterpart to scrape-seloger-suburb above — identical
  # town list and pagination mechanism, verified live to work for sale via
  # the same distributionTypes=Buy parameter confirmed for the main
  # SeLoger scraper. Sharded the same way, but sale volume runs much
  # higher than rent (e.g. Issy-les-Moulineaux: 232 rent vs 1493 sale),
  # so shard counts differ significantly from the rent job above.
  scrape-seloger-suburb-sale:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { town: neuilly-sur-seine, shard: 0, shardCount: 3 }
          - { town: neuilly-sur-seine, shard: 1, shardCount: 3 }
          - { town: neuilly-sur-seine, shard: 2, shardCount: 3 }
          - { town: boulogne-billancourt, shard: 0, shardCount: 4 }
          - { town: boulogne-billancourt, shard: 1, shardCount: 4 }
          - { town: boulogne-billancourt, shard: 2, shardCount: 4 }
          - { town: boulogne-billancourt, shard: 3, shardCount: 4 }
          - { town: suresnes, shard: 0, shardCount: 2 }
          - { town: suresnes, shard: 1, shardCount: 2 }
          - { town: levallois-perret, shard: 0, shardCount: 3 }
          - { town: levallois-perret, shard: 1, shardCount: 3 }
          - { town: levallois-perret, shard: 2, shardCount: 3 }
          - { town: rueil-malmaison, shard: 0, shardCount: 3 }
          - { town: rueil-malmaison, shard: 1, shardCount: 3 }
          - { town: rueil-malmaison, shard: 2, shardCount: 3 }
          - { town: puteaux, shard: 0, shardCount: 3 }
          - { town: puteaux, shard: 1, shardCount: 3 }
          - { town: puteaux, shard: 2, shardCount: 3 }
          - { town: saint-cloud, shard: 0, shardCount: 2 }
          - { town: saint-cloud, shard: 1, shardCount: 2 }
          - { town: saint-germain-en-laye, shard: 0, shardCount: 2 }
          - { town: saint-germain-en-laye, shard: 1, shardCount: 2 }
          - { town: le-vesinet, shard: 0, shardCount: 1 }
          - { town: vaucresson, shard: 0, shardCount: 1 }
          - { town: garches, shard: 0, shardCount: 1 }
          - { town: marnes-la-coquette, shard: 0, shardCount: 1 }
          - { town: ville-d-avray, shard: 0, shardCount: 1 }
          - { town: courbevoie, shard: 0, shardCount: 3 }
          - { town: courbevoie, shard: 1, shardCount: 3 }
          - { town: courbevoie, shard: 2, shardCount: 3 }
          - { town: versailles, shard: 0, shardCount: 3 }
          - { town: versailles, shard: 1, shardCount: 3 }
          - { town: versailles, shard: 2, shardCount: 3 }
          - { town: issy-les-moulineaux, shard: 0, shardCount: 4 }
          - { town: issy-les-moulineaux, shard: 1, shardCount: 4 }
          - { town: issy-les-moulineaux, shard: 2, shardCount: 4 }
          - { town: issy-les-moulineaux, shard: 3, shardCount: 4 }
          - { town: colombes, shard: 0, shardCount: 3 }
          - { town: colombes, shard: 1, shardCount: 3 }
          - { town: colombes, shard: 2, shardCount: 3 }
          - { town: nanterre, shard: 0, shardCount: 2 }
          - { town: nanterre, shard: 1, shardCount: 2 }
          - { town: chatou, shard: 0, shardCount: 2 }
          - { town: chatou, shard: 1, shardCount: 2 }
          - { town: croissy-sur-seine, shard: 0, shardCount: 1 }
          - { town: la-celle-saint-cloud, shard: 0, shardCount: 1 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
      - name: Scrape ${{ matrix.town }} sale shard ${{ matrix.shard }}/${{ matrix.shardCount }} in isolation
        run: node scrape-single-seloger-suburb.js ${{ matrix.town }} sale ${{ matrix.shard }} ${{ matrix.shardCount }}
      - name: Upload ${{ matrix.town }} sale shard ${{ matrix.shard }} result
        uses: actions/upload-artifact@v4
        with:
          name: output-seloger-${{ matrix.town }}-shard-${{ matrix.shard }}-sale
          path: output-seloger-${{ matrix.town }}-shard-${{ matrix.shard }}-sale.json
          retention-days: 1

  # Each Paris arrondissement gets its OWN isolated job too — same trick
  # that fixed the suburbs, now used to get past Paris' unsolved
  # pagination problem (seloger-scraper.js's own notes: 3 different
  # pagination strategies tried, all failed) by treating each
  # arrondissement as its own single-page "location" search instead.
  #
  # Sharded per arrondissement (shard/shardCount in the matrix): same
  # reasoning and sizing as scrape-seloger-suburb above — the 15th, 16th,
  # and 17th need 2 shards each for rent (784/706/566 listings), sized so
  # each shard's enrichment stays around ~20-25 min.
  scrape-seloger-arrondissement:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arr: 1, shard: 0, shardCount: 1 }
          - { arr: 2, shard: 0, shardCount: 1 }
          - { arr: 3, shard: 0, shardCount: 1 }
          - { arr: 4, shard: 0, shardCount: 1 }
          - { arr: 5, shard: 0, shardCount: 1 }
          - { arr: 6, shard: 0, shardCount: 1 }
          - { arr: 7, shard: 0, shardCount: 1 }
          - { arr: 8, shard: 0, shardCount: 1 }
          - { arr: 9, shard: 0, shardCount: 1 }
          - { arr: 10, shard: 0, shardCount: 1 }
          - { arr: 11, shard: 0, shardCount: 1 }
          - { arr: 12, shard: 0, shardCount: 1 }
          - { arr: 13, shard: 0, shardCount: 1 }
          - { arr: 14, shard: 0, shardCount: 1 }
          - { arr: 15, shard: 0, shardCount: 2 }
          - { arr: 15, shard: 1, shardCount: 2 }
          - { arr: 16, shard: 0, shardCount: 2 }
          - { arr: 16, shard: 1, shardCount: 2 }
          - { arr: 17, shard: 0, shardCount: 2 }
          - { arr: 17, shard: 1, shardCount: 2 }
          - { arr: 18, shard: 0, shardCount: 1 }
          - { arr: 19, shard: 0, shardCount: 1 }
          - { arr: 20, shard: 0, shardCount: 1 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
      - name: Scrape arrondissement ${{ matrix.arr }} shard ${{ matrix.shard }}/${{ matrix.shardCount }} in isolation
        run: node scrape-single-seloger-arrondissement.js ${{ matrix.arr }} rent ${{ matrix.shard }} ${{ matrix.shardCount }}
      - name: Upload arrondissement ${{ matrix.arr }} shard ${{ matrix.shard }} result
        uses: actions/upload-artifact@v4
        with:
          name: output-seloger-arr-${{ matrix.arr }}-shard-${{ matrix.shard }}
          path: output-seloger-arr-${{ matrix.arr }}-shard-${{ matrix.shard }}.json
          retention-days: 1

  # Sale-listing counterpart to scrape-seloger-arrondissement above — same
  # 20 arrondissements, verified live to work for sale via the same
  # /classified-search?...&page=N mechanism confirmed for rent. Sale
  # volume runs dramatically higher than rent (arr 15: 784 rent vs 2075
  # sale, needing 5 shards vs 2) — shard counts computed independently
  # from real sale-listing counts measured live this session.
  scrape-seloger-arrondissement-sale:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arr: 1, shard: 0, shardCount: 1 }
          - { arr: 2, shard: 0, shardCount: 1 }
          - { arr: 3, shard: 0, shardCount: 2 }
          - { arr: 3, shard: 1, shardCount: 2 }
          - { arr: 4, shard: 0, shardCount: 2 }
          - { arr: 4, shard: 1, shardCount: 2 }
          - { arr: 5, shard: 0, shardCount: 2 }
          - { arr: 5, shard: 1, shardCount: 2 }
          - { arr: 6, shard: 0, shardCount: 2 }
          - { arr: 6, shard: 1, shardCount: 2 }
          - { arr: 7, shard: 0, shardCount: 1 }
          - { arr: 8, shard: 0, shardCount: 2 }
          - { arr: 8, shard: 1, shardCount: 2 }
          - { arr: 9, shard: 0, shardCount: 2 }
          - { arr: 9, shard: 1, shardCount: 2 }
          - { arr: 10, shard: 0, shardCount: 2 }
          - { arr: 10, shard: 1, shardCount: 2 }
          - { arr: 11, shard: 0, shardCount: 3 }
          - { arr: 11, shard: 1, shardCount: 3 }
          - { arr: 11, shard: 2, shardCount: 3 }
          - { arr: 12, shard: 0, shardCount: 2 }
          - { arr: 12, shard: 1, shardCount: 2 }
          - { arr: 13, shard: 0, shardCount: 1 }
          - { arr: 14, shard: 0, shardCount: 3 }
          - { arr: 14, shard: 1, shardCount: 3 }
          - { arr: 14, shard: 2, shardCount: 3 }
          - { arr: 15, shard: 0, shardCount: 5 }
          - { arr: 15, shard: 1, shardCount: 5 }
          - { arr: 15, shard: 2, shardCount: 5 }
          - { arr: 15, shard: 3, shardCount: 5 }
          - { arr: 15, shard: 4, shardCount: 5 }
          - { arr: 16, shard: 0, shardCount: 3 }
          - { arr: 16, shard: 1, shardCount: 3 }
          - { arr: 16, shard: 2, shardCount: 3 }
          - { arr: 17, shard: 0, shardCount: 1 }
          - { arr: 18, shard: 0, shardCount: 1 }
          - { arr: 19, shard: 0, shardCount: 3 }
          - { arr: 19, shard: 1, shardCount: 3 }
          - { arr: 19, shard: 2, shardCount: 3 }
          - { arr: 20, shard: 0, shardCount: 3 }
          - { arr: 20, shard: 1, shardCount: 3 }
          - { arr: 20, shard: 2, shardCount: 3 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
      - name: Scrape arrondissement ${{ matrix.arr }} sale shard ${{ matrix.shard }}/${{ matrix.shardCount }} in isolation
        run: node scrape-single-seloger-arrondissement.js ${{ matrix.arr }} sale ${{ matrix.shard }} ${{ matrix.shardCount }}
      - name: Upload arrondissement ${{ matrix.arr }} sale shard ${{ matrix.shard }} result
        uses: actions/upload-artifact@v4
        with:
          name: output-seloger-arr-${{ matrix.arr }}-shard-${{ matrix.shard }}-sale
          path: output-seloger-arr-${{ matrix.arr }}-shard-${{ matrix.shard }}-sale.json
          retention-days: 1

  # Each ParisRental page gets its OWN isolated job — tried after the
  # combined scraper returned 0 results specifically on GitHub Actions
  # while working fine from a home network with identical code, pointing
  # to GitHub's IP range itself being blocked. Not guaranteed to help
  # (unlike SeLoger's session-pattern issue, this looks like a more
  # straightforward IP block, which isolation may not fix since every
  # isolated job still originates from the same GitHub IP range) — this
  # is a genuine experiment, not a confirmed fix.
  scrape-parisrental-page:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - { category: furnished, page: 1 }
          - { category: furnished, page: 2 }
          - { category: furnished, page: 3 }
          - { category: furnished, page: 4 }
          - { category: furnished, page: 5 }
          - { category: furnished, page: 6 }
          - { category: furnished, page: 7 }
          - { category: unfurnished, page: 1 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer
      - name: Scrape ${{ matrix.category }} page ${{ matrix.page }} in isolation
        run: node scrape-single-parisrental-page.js ${{ matrix.category }} ${{ matrix.page }}
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: output-parisrental-${{ matrix.category }}-${{ matrix.page }}
          path: output-parisrental-${{ matrix.category }}-${{ matrix.page }}.json
          retention-days: 1

  # Sale-listing counterpart — a single job, not a matrix, since sale
  # inventory was confirmed live at just 4 listings total (vs the ~93
  # rent listings across furnished+unfurnished needing 8 paginated jobs).
  scrape-parisrental-sale:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer
      - name: Scrape sale listings in isolation
        run: node scrape-single-parisrental-page.js sale 1
      - name: Upload sale result
        uses: actions/upload-artifact@v4
        with:
          name: output-parisrental-sale-1
          path: output-parisrental-sale-1.json
          retention-days: 1

  # DanielFeau moved to its own isolated job after adding real detail-page
  # enrichment for elevator/furnished/bathroom info - can have up to 600
  # listings, and enriching all of them at a cautious, anti-bot-safe rate
  # (low concurrency, small delays) needs more time than scrape-main's
  # shared 15-minute budget with Barnes/Junot/SeLoger-main could afford.
  scrape-danielfeau:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer
      - name: Scrape DanielFeau rent in isolation
        run: node scrape-single-danielfeau.js rent
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: output-danielfeau
          path: output-danielfeau.json
          retention-days: 1

  scrape-danielfeau-sale:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer
      - name: Scrape DanielFeau sale in isolation
        run: node scrape-single-danielfeau.js sale
      - name: Upload sale result
        uses: actions/upload-artifact@v4
        with:
          name: output-danielfeau-sale
          path: output-danielfeau-sale.json
          retention-days: 1

  # Eiffel Housing moved to its own isolated job after adding real
  # detail-page enrichment for bathroom info - confirmed live that
  # scrape-main got cancelled at its 15-minute timeout mid-way through
  # Eiffel Housing's enrichment step (152 listings), which didn't exist
  # before this session and wasn't accounted for in the shared budget.
  scrape-eiffel-housing:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
      - name: Scrape Eiffel Housing rent in isolation
        run: node scrape-single-eiffel-housing.js rent
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: output-eiffel-housing
          path: output-eiffel-housing.json
          retention-days: 1

  scrape-eiffel-housing-sale:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
      - name: Scrape Eiffel Housing sale in isolation
        run: node scrape-single-eiffel-housing.js sale
      - name: Upload sale result
        uses: actions/upload-artifact@v4
        with:
          name: output-eiffel-housing-sale
          path: output-eiffel-housing-sale.json
          retention-days: 1

  # Downloads every artifact from all eight jobs above, merges everything,
  # and writes/commits the final Excel file.
  merge-and-commit:
    needs: [check-schedule, scrape-main, scrape-main-sale, scrape-seloger-suburb, scrape-seloger-suburb-sale, scrape-seloger-arrondissement, scrape-seloger-arrondissement-sale, scrape-parisrental-page, scrape-parisrental-sale, scrape-danielfeau, scrape-danielfeau-sale, scrape-eiffel-housing, scrape-eiffel-housing-sale]
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install exceljs googleapis
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Merge and generate Excel - rent
        run: node merge-and-generate.js rent artifacts
      - name: Merge and generate Excel - sale
        run: node merge-and-generate.js sale artifacts
      - name: Sync to Google Sheets
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEET_ID: '1maB2BiEzEK2XwC-vVHJGJuigdLGSUi9Yyh3psVWHt_I'
        run: node sync-to-google-sheets.js listings.json listings-sale.json
      - name: Commit updated Excel files to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add listings.xlsx listings-sale.xlsx
          git commit -m "Update listings: $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
      - name: Prepare Pages output
        run: |
          mkdir -p _site
          cp listings.xlsx _site/listings.xlsx
          cp listings.json _site/listings.json
          cp listings-sale.xlsx _site/listings-sale.xlsx
          cp listings-sale.json _site/listings-sale.json
          cp index.html _site/index.html
          cp normalize-area.js _site/normalize-area.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: [check-schedule, merge-and-commit]
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
